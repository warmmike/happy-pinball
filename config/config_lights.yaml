#config_version=6
# Light groups — playfield geography (physical order: bottom→middle→top→backwall).
#   gi_bottom  (led_1-5,   lower playfield / slingshots / lower inserts)
#   gi_middle  (led_6-10,  mid playfield / pop bumper area)
#   gi_top     (led_11-15, top of playfield)
#   gi_backwall(led_16-20, back wall / cabinet GI)
#   gi_upper   (led_11-20, top + backwall combined)
#   gi    (all 20, convenience tag for whole-machine addressing)

