#config_version=6

# Dual-wound coil wiring (FL-11629 / Williams style):
#   Measure resistance between all 3 terminal pairs before wiring.
#   Highest reading = sum of both windings — eliminate that pair.
#   Remaining: lowest R (~3 ohm) = main, higher R (~17 ohm) = hold.
#   The terminal shared by both remaining pairs = COMMON → connect to HV_B (J13).
#   Internal coil diode band (cathode) must face toward HV/common terminal.
#   All 4 flipper coils are on J7 (bank B, HV_B), pins 6-9, above the HV_B key pin.
#   J7 pin 5 = HV_B (* key pin) — do NOT wire a coil to this pin.

coils:
  c_trough_eject:
    number: 0-0-15                 # J7 pin 9 (moved to free odd-numbered pins for flippers)

  # Right flipper — FL-11629 dual-wound, J7 pins 6 & 8 (skip pin 7)
  c_flipper_right_main:
    number: 0-0-5                  # J7 pin 6
    default_pulse_ms: 20

  c_flipper_right_hold:
    number: 0-0-7                  # J7 pin 8
    allow_enable: true

  # Left flipper — FL-11629 dual-wound, J7 pins 1 & 3 (skip pin 2, key pin between left & right)
  c_flipper_left_main:
    number: 0-0-1                  # J7 pin 1
    default_pulse_ms: 20

  c_flipper_left_hold:
    number: 0-0-3                  # J7 pin 3
    allow_enable: true