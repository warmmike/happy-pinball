#config_version=6

# Base mode that starts at the beginning of each ball
# and stops at the end of each ball.

mode:
  start_events: start_mode_bumpers
  stop_events: stop_mode_bumpers
  priority: 110

shots:
  bumper_left:
    switch: s_bumper_left
  bumper_right:
    switch: s_bumper_right
  bumper_bottom:
    switch: s_bumper_bottom

shot_groups:
  bumpers:
    shots: bumper_left, bumper_right, bumper_bottom

variable_player:
  bumpers_hit:
    score: 1_000
    bumper_hits: 1

sound_player:
  bumper_left_hit:
    bumper_left:
      bus: effects
      volume: 0.8
  bumper_right_hit:
    bumper_right:
      bus: effects
      volume: 0.8
  bumper_bottom_hit:
    bumper_bottom:
      bus: effects
      volume: 0.8
