#config_version=6

tilt:
  tilt_warning_switch_tag: tilt_warning
  tilt_switch_tag: tilt
  slam_tilt_switch_tag: slam_tilt
  warnings_to_tilt: 3
  reset_warnings_events: ball_ended
  multiple_hit_window: 500ms
  settle_time: 16s
  tilt_warnings_player_var: tilt_warnings

show_player:
  tilt_warning_1:
    tilt_warning_show:
      priority: 10
      loops: 0
  tilt_warning_2:
    tilt_warning_show:
      priority: 10
      loops: 0
  tilt:
    tilt_show:
      priority: 10
      loops: 0

slide_player:
  _overwrite: True # overwrite the default slide_player from tilt mode

  tilt_warning_1: # event name
    tilt_warning_1: # slide name
      expire: 3s
      tokens:
        warning_number: 1

  tilt_warning_2:
    tilt_warning_2:
      expire: 3s
      tokens:
        warning_number: 2

  tilt:
    tilt:
      action: play

  tilt_clear:
    tilt:
      action: remove

