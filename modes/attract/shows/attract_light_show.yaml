#show_version=6
# Attract light show — five sequences, ~18s loop
#   1. Forward comet (red, 1→20,  3.3s)
#   2. Reverse comet (blue, 20→1, 3.3s)
#   3. Color wash    (rainbow,    4.2s)
#   4. Breathe white (2 pulses,   4.8s)
