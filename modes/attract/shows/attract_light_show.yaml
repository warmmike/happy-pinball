#show_version=6
# Diagnostic: one LED at a time, 1s each, then all together

- duration: 1s
  lights:
    led_1: white
    led_2: off
    led_3: off
    led_4: off

- duration: 1s
  lights:
    led_1: off
    led_2: white
    led_3: off
    led_4: off

- duration: 1s
  lights:
    led_1: off
    led_2: off
    led_3: white
    led_4: off

- duration: 1s
  lights:
    led_1: off
    led_2: off
    led_3: off
    led_4: white

- duration: 1s
  lights:
    led_1: white
    led_2: white
    led_3: white
    led_4: white

- duration: 0.5s
  lights:
    led_1: off
    led_2: off
    led_3: off
    led_4: off
