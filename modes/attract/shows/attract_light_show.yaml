#show_version=6
# Mosh Pit attract show — ~20s loop
#   1. Crimson Breathe    (dark red pulse x2,        3.2s)
#   2. Forward Surge x3   (escalating 120→80→60ms,   5.7s)
#   3. Reverse Surge x3   (decelerating 60→80→120ms, 5.7s)
#   4. Dark Descent       (heavy color shift,         3.5s)
#   5. Pit Strobe         (deep red/purple + burst,   2.0s)


