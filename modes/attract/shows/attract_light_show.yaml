# Fade in and out a single color (e.g., cyan)
- lights:
    led_1:
      color: cyan
      fade: 0.5s
    led_2:
      color: cyan
      fade: 0.5s
    led_3:
      color: cyan
      fade: 0.5s
    led_4:
      color: cyan
      fade: 0.5s
    led_5:
      color: cyan
      fade: 0.5s
  duration: 0.5
- lights:
    led_1:
      color: off
      fade: 0.5s
    led_2:
      color: off
      fade: 0.5s
    led_3:
      color: off
      fade: 0.5s
    led_4:
      color: off
      fade: 0.5s
    led_5:
      color: off
      fade: 0.5s
  duration: 0.5

# Flash the same color three times
- duration: 0.2
  lights:
    led_1: cyan
    led_2: cyan
    led_3: cyan
    led_4: cyan
    led_5: cyan
- duration: 0.2
