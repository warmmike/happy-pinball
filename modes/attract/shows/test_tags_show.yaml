# Minimal tag group test — 3 steps, duration: format, simple colors

- duration: 2s
  lights:
    (gi_top):
      color: ff0000
      fade: 500ms
    (gi_middle):
      color: ff0000
      fade: 500ms
    (gi_bottom):
      color: ff0000
      fade: 500ms
    (gi_backwall):
      color: ff0000
      fade: 500ms

- duration: 2s
