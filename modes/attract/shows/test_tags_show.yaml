    (gi_top):
      color: ffffff
      fade: 500ms
    (gi_middle):
      color: ffffff
      fade: 500ms
    (gi_bottom):
      color: ffffff
      fade: 500ms
    (gi_backwall):
      color: ffffff
      fade: 500ms

- duration: 2s
